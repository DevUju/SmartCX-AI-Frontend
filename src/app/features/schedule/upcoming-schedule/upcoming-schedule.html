<div class="container">
  <div class="upcoming-container">
  <!-- Header -->
  <div class="header-row">
    <h2 class="header">Upcoming Schedule</h2>
    <button mat-icon-button class="settings-btn" routerLink="/profile">
      <mat-icon>settings</mat-icon>
    </button>
  </div>

  <div *ngIf="error()" class="error-message">{{ error() }}</div>
  <button mat-raised-button color="primary" (click)="createQuickEvent()">Add Quick Event</button>

  <!-- Calendar -->
  <div class="calendar-strip">
    <h3>This Month</h3>
    <div id="calendar"></div>
  </div>

  <!-- Event List -->
  <div class="day-section">
    <h4>Upcoming Events</h4>
    <p *ngIf="loading()" class="progress-label">Loading events...</p>
    <p *ngIf="!loading() && !events().length" class="progress-label">No upcoming events.</p>

    <div *ngFor="let event of events()" class="event-card">
      <p class="time">{{ event.time || '--:--' }}</p>
      <p class="category">EVENT</p>
      <p class="title">{{ event.title }}</p>
      <p class="desc">{{ event.description || 'No description' }}</p>
      <p class="desc">{{ event.date | date:'mediumDate' }}</p>
    </div>
  </div>
</div>

<!-- Bottom Navigation -->
<nav class="bottom-nav">
  <button mat-button routerLink="/daily" routerLinkActive="active">
    <mat-icon>task_alt</mat-icon>
    Daily
  </button>
  <button mat-button routerLink="/upcoming" routerLinkActive="active">
    <mat-icon>event</mat-icon>
    Upcoming
  </button>
  <button mat-button routerLink="/projects" routerLinkActive="active">
    <mat-icon>work</mat-icon>
    Projects
  </button>
  <button mat-button routerLink="/analytics" routerLinkActive="active">
    <mat-icon>analytics</mat-icon>
    Stats
  </button>
 </nav>
</div>
