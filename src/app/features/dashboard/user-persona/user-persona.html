<div class="card">
  <img src="assets/manager.png" alt="Profile" class="avatar">
  <h2>{{ persona.name }}, {{ persona.role }}</h2>

  <mat-card class="section">
    <h3>Primary Goals</h3>
    <ul>
      <li *ngFor="let goal of persona.goals">{{ goal }}</li>
    </ul>
  </mat-card>

  <mat-card class="section orange">
    <h3>Frustrations</h3>
    <ul>
      <li *ngFor="let frustration of persona.frustrations">{{ frustration }}</li>
    </ul>
  </mat-card>

  <mat-card class="section">
    <h3>A Day in the Life</h3>
    <ul>
      <li *ngFor="let activity of persona.dayInLife">{{ activity }}</li>
    </ul>
  </mat-card>

  <mat-card class="section">
    <h3>Personality Profile</h3>
    <p>{{ persona.personality }}</p>
  </mat-card>

  <mat-card class="section">
    <h3>Biography</h3>
    <p>{{ persona.biography }}</p>
  </mat-card>
</div>
