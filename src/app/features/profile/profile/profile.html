<div class="container">
  <h2 class="app-title">Profile</h2>

  <div *ngIf="user; else noUser" class="profile-card">
    <p><strong>Name:</strong> {{ user.fullName }}</p>
    <p><strong>Email:</strong> {{ user.email }}</p>
    <p><strong>Persona:</strong> {{ user.persona }}</p>
  </div>

  <ng-template #noUser>
    <p class="no-user">No user data available. Please sign up first.</p>
  </ng-template>
</div>
