<aside class="sidebar">
  <section class="brand">
    <div class="brand-mark">SCX</div>
    <div>
      <h2>Support Team</h2>
      <p>Lagos Hub</p>
    </div>
  </section>

  <nav aria-label="Primary">
    @for (item of navLinks; track item.path) {
      <a
        [routerLink]="item.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.path === '/dashboard' }"
      >
        <span class="nav-icon" aria-hidden="true">
          @if (item.path === '/dashboard') {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="8" height="8" rx="1.5"></rect>
              <rect x="13" y="3" width="8" height="5" rx="1.5"></rect>
              <rect x="13" y="10" width="8" height="11" rx="1.5"></rect>
              <rect x="3" y="13" width="8" height="8" rx="1.5"></rect>
            </svg>
          }
          @if (item.path === '/issues') {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 6h11"></path>
              <path d="M9 12h11"></path>
              <path d="M9 18h11"></path>
              <circle cx="5" cy="6" r="1"></circle>
              <circle cx="5" cy="12" r="1"></circle>
              <circle cx="5" cy="18" r="1"></circle>
            </svg>
          }
          @if (item.path === '/tickets') {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 8a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v3a2 2 0 0 0 0 4v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-3a2 2 0 0 0 0-4V8z"></path>
              <path d="M12 6v12"></path>
            </svg>
          }
          @if (item.path === '/settings') {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.03.03a2 2 0 1 1-2.83 2.83l-.03-.03A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.4 1.08V21a2 2 0 1 1-4 0v-.05a1.7 1.7 0 0 0-1.4-1.68 1.7 1.7 0 0 0-1.87.34l-.03.03a2 2 0 1 1-2.83-2.83l.03-.03A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1.08-.4H3a2 2 0 1 1 0-4h.05a1.7 1.7 0 0 0 1.68-1.4 1.7 1.7 0 0 0-.34-1.87l-.03-.03a2 2 0 1 1 2.83-2.83l.03.03A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6 1.7 1.7 0 0 0 .4-1.08V3a2 2 0 1 1 4 0v.05a1.7 1.7 0 0 0 1.4 1.68 1.7 1.7 0 0 0 1.87-.34l.03-.03a2 2 0 1 1 2.83 2.83l-.03.03A1.7 1.7 0 0 0 19.4 9c.26.3.47.65.6 1 .08.31.05.68.05 1s.03.69-.05 1c-.13.35-.34.7-.6 1z"></path>
            </svg>
          }
        </span>
        {{ item.label }}
      </a>
    }
  </nav>

  <section class="status-card">
    <p>System Status</p>
    <div>
      <span class="dot"></span>
      Operational
    </div>
  </section>
</aside>
