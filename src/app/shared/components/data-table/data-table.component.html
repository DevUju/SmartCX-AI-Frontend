<div class="table-shell">
  <table>
    <thead>
      <tr>
        @for (column of columns(); track column.key) {
          <th>{{ column.label }}</th>
        }
      </tr>
    </thead>
    <tbody>
      @if (hasRows()) {
        @for (row of rows(); track row) {
          <tr>
            @for (column of columns(); track column.key) {
              <td>{{ row[column.key] ?? '—' }}</td>
            }
          </tr>
        }
      } @else {
        <tr>
          <td [attr.colspan]="columns().length">No records found.</td>
        </tr>
      }
    </tbody>
  </table>
</div>
